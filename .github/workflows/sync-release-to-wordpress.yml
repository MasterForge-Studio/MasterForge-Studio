name: Sync Release to WordPress

on:
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to sync
        required: true
        default: v0.3.1-alpha

jobs:
  sync-release:
    runs-on: ubuntu-latest

    steps:
      - name: Load release information
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            jq '.release' "$GITHUB_EVENT_PATH" > release.json
          else
            gh api \
              "repos/$GITHUB_REPOSITORY/releases/tags/$MANUAL_RELEASE_TAG" \
              > release.json
          fi

          RELEASE_TAG="$(jq -r '.tag_name' release.json)"
          RELEASE_NAME="$(jq -r '.name // .tag_name' release.json)"
          RELEASE_NOTES="$(jq -r '.body // ""' release.json)"
          PUBLISHED_AT="$(jq -r '.published_at // ""' release.json)"

          INSTALLER_URL="$(
            jq -r '
              .assets[]
              | select(.name | endswith(".exe"))
              | .browser_download_url
            ' release.json | head -n 1
          )"

          if [ -z "$INSTALLER_URL" ] || [ "$INSTALLER_URL" = "null" ]; then
            echo "No Windows .exe asset was found on release $RELEASE_TAG."
            exit 1
          fi

          curl --fail --location \
            --output masterforge-installer.exe \
            "$INSTALLER_URL"

          INSTALLER_CHECKSUM="$(
            sha256sum masterforge-installer.exe |
            awk '{ print $1 }'
          )"

          {
            echo "tag=$RELEASE_TAG"
            echo "name<<MFTM_RELEASE_NAME"
            echo "$RELEASE_NAME"
            echo "MFTM_RELEASE_NAME"
            echo "notes<<MFTM_RELEASE_NOTES"
            echo "$RELEASE_NOTES"
            echo "MFTM_RELEASE_NOTES"
            echo "published_at=$PUBLISHED_AT"
            echo "download_url=$INSTALLER_URL"
            echo "checksum=$INSTALLER_CHECKSUM"
          } >> "$GITHUB_OUTPUT"

      - name: Sync release to WordPress
        shell: bash
        env:
          SYNC_URL: ${{ secrets.MASTERFORGE_SYNC_URL }}
          SYNC_TOKEN: ${{ secrets.MASTERFORGE_SYNC_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
          RELEASE_NOTES: ${{ steps.release.outputs.notes }}
          PUBLISHED_AT: ${{ steps.release.outputs.published_at }}
          DOWNLOAD_URL: ${{ steps.release.outputs.download_url }}
          CHECKSUM: ${{ steps.release.outputs.checksum }}
        run: |
          VERSION="${RELEASE_TAG#v}"

          PAYLOAD="$(
            jq -n \
              --arg version "$VERSION" \
              --arg release_name "$RELEASE_NAME" \
              --arg download_url "$DOWNLOAD_URL" \
              --arg release_notes "$RELEASE_NOTES" \
              --arg published_at "$PUBLISHED_AT" \
              --arg checksum "$CHECKSUM" \
              '{
                version: $version,
                release_name: $release_name,
                download_url: $download_url,
                release_notes: $release_notes,
                published_at: $published_at,
                checksum: $checksum
              }'
          )"

          curl --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-MasterForge-Release-Token: $SYNC_TOKEN" \
            --data "$PAYLOAD" \
            "$SYNC_URL"
